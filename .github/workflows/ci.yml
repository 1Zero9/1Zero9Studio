name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
      AUTH_SECRET: ci-placeholder-secret-not-used-at-build-time
      ADMIN_EMAIL: ci@example.com
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Public project pages query ProjectMedia/ProjectLink via Prisma at
      # build time (SSG), so the build needs a real, migrated database.
      - run: npx prisma migrate deploy

      - run: npm run lint

      # content-collections generates its virtual module as a side effect
      # of next build starting up, so build must run before typecheck can
      # resolve `content-collections` imports on a clean checkout.
      - run: npm run build

      - run: npm run typecheck

      # Automated accessibility check (axe-core) against the built app —
      # backs up the colophon's public claim of a11y verification "on
      # every change" with real CI enforcement instead of a manual pass.
      - run: npm run a11y:ci
