<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Park Run Dash</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="orientation-notice" aria-live="polite">
      <div>
        <span>Park Run Dash</span>
        <strong>Rotate Phone</strong>
        <p>This game runs in landscape. Turn your phone sideways, then use the on-screen controls.</p>
      </div>
    </div>

    <main class="game-shell" aria-label="Park Run Dash game">
      <header class="hud" aria-label="Game status">
        <div>
          <span class="hud-label">Distance</span>
          <strong id="distance">0.00 km</strong>
        </div>
        <div>
          <span class="hud-label">Best</span>
          <strong id="best">0.00 km</strong>
        </div>
        <div>
          <span class="hud-label">Weather</span>
          <strong id="weather">Sunny</strong>
        </div>
        <div>
          <span class="hud-label">Time</span>
          <strong id="timer">00:00</strong>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <section class="stage-wrap">
        <canvas id="game" width="960" height="540" tabindex="0" aria-label="Side scrolling Park Run jumping game"></canvas>
        <div id="overlay" class="overlay">
          <h1>Park Run Dash</h1>
          <p>Jump the logs and reach the 5km finish.</p>
          <div class="runner-select" role="group" aria-label="Choose runner">
            <button id="male" class="runner-option selected" type="button" aria-pressed="true">Male</button>
            <button id="female" class="runner-option" type="button" aria-pressed="false">Female</button>
          </div>
          <button id="start" type="button">Start Run</button>
        </div>
      </section>

      <footer class="controls">
        <span>Space / ↑ / tap to jump</span>
        <div class="speed-controls" aria-label="Speed controls">
          <button id="slow" class="speed-button" type="button" aria-label="Run slower">←</button>
          <span id="speed">Pace x1.00</span>
          <button id="fast" class="speed-button" type="button" aria-label="Run faster">→</button>
        </div>
        <span>Reach 5.00 km</span>
      </footer>
    </main>

    <script src="game.js"></script>
  </body>
</html>
